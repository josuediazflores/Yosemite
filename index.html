<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pick a spot in Yosemite and see what's around it right now — air quality, wildlife sightings, river conditions, and hazards on a topographic map." />
    <title>Yosemite Field Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="console">
      <div class="console__brand">
        <span class="console__mark" aria-hidden="true"></span>
        <div>
          <p class="console__title">Yosemite Field Monitor</p>
          <p class="console__sub mono">37.8400°N 119.5400°W · FIELD STATION CONSOLE</p>
        </div>
      </div>
      <div id="gauge-readout" aria-live="polite"></div>
    </header>
    <div id="alert-banner" class="banner" role="status" hidden></div>
    <main class="stage">
      <div id="map" aria-label="Topographic map of Yosemite National Park"></div>
      <fieldset id="layer-control" class="layer-control"></fieldset>
      <aside id="panel" class="panel" aria-label="Site details" tabindex="-1" hidden></aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
